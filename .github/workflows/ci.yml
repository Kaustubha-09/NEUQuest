name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android:
    name: Android build + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
      - name: Stub google-services.json
        run: |
          mkdir -p app
          cat > app/google-services.json <<'JSON'
          {"project_info":{"project_number":"0","project_id":"stub","storage_bucket":"stub"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"edu.northeastern.numad24su_group9"}},"oauth_client":[],"api_key":[{"current_key":"stub"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          JSON
      - name: Build (debug)
        run: ./gradlew assembleDebug --no-daemon
      - name: Unit tests
        run: ./gradlew test --no-daemon

  ios:
    name: iOS build (sim)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Build
        run: |
          cd ios
          xcodebuild \
            -project NEUQuest.xcodeproj \
            -scheme NEUQuest \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty || exit ${PIPESTATUS[0]}
